<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>JSON ↔ XML Converter Online | Avonci Tools</title>
    <meta name="description" content="Convert JSON to XML and XML to JSON instantly. Free online converter with formatting and copy support.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <!-- SEO -->
    <link rel="canonical" href="https://avonci.net/tools/json">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="../style.css">

    <style>
        textarea {
            width: 100%;
            height: 160px;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            resize: vertical;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .buttons button {
            flex: 1;
        }

        .copy-btn {
            background: #22c55e;
        }

        .copy-btn:hover {
            background: #16a34a;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/" class="back">← Back</a>

    <h1>JSON ↔ XML Converter</h1>

    <div class="tool-card">

        <textarea id="input" placeholder="Paste JSON or XML here..."></textarea>

        <div class="buttons">
            <button onclick="jsonToXml()">JSON → XML</button>
            <button onclick="xmlToJson()">XML → JSON</button>
        </div>

        <textarea id="output" placeholder="Result will appear here..."></textarea>

        <div class="buttons">
            <button class="copy-btn" onclick="copyOutput()">Copy Output</button>
        </div>

        <div id="error" class="error"></div>

    </div>

</div>

<script>
// ---------- JSON → XML ----------
function jsonToXml() {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");
    const error = document.getElementById("error");

    error.textContent = "";

    try {
        const obj = JSON.parse(input);
        const xml = convertToXml(obj);
        output.value = xml;
    } catch (e) {
        error.textContent = "Invalid JSON input";
    }
}

function convertToXml(obj, indent = "") {
    let xml = "";

    for (let key in obj) {
        if (Array.isArray(obj[key])) {
            xml += `${indent}<${key}>\n`;
            obj[key].forEach(item => {
                if (typeof item === "object") {
                    xml += `${indent}  <item>\n`;
                    xml += convertToXml(item, indent + "    ");
                    xml += `${indent}  </item>\n`;
                } else {
                    xml += `${indent}  <item>${item}</item>\n`;
                }
            });
            xml += `${indent}</${key}>\n`;
        } 
        else if (typeof obj[key] === "object") {
            xml += `${indent}<${key}>\n`;
            xml += convertToXml(obj[key], indent + "  ");
            xml += `${indent}</${key}>\n`;
        } 
        else {
            xml += `${indent}<${key}>${obj[key]}</${key}>\n`;
        }
    }

    return xml;
}

// ---------- XML → JSON ----------
function xmlToJson() {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");
    const error = document.getElementById("error");

    error.textContent = "";

    try {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(input, "text/xml");

        if (xmlDoc.getElementsByTagName("parsererror").length) {
            throw new Error();
        }

        const json = xmlToJsonRecursive(xmlDoc.documentElement);
        output.value = JSON.stringify(json, null, 2);
    } catch (e) {
        error.textContent = "Invalid XML input";
    }
}

function xmlToJsonRecursive(node) {
    let obj = {};

    if (node.children.length === 0) {
        return parseValue(node.textContent);
    }

    for (let child of node.children) {
        const name = child.nodeName;
        const value = xmlToJsonRecursive(child);

        if (obj[name]) {
            if (!Array.isArray(obj[name])) {
                obj[name] = [obj[name]];
            }
            obj[name].push(value);
        } else {
            obj[name] = value;
        }
    }

    return obj;
}

// ---------- Value parsing ----------
function parseValue(value) {
    value = value.trim();

    if (value === "true") return true;
    if (value === "false") return false;
    if (!isNaN(value) && value !== "") return Number(value);

    return value;
}

// ---------- Copy ----------
function copyOutput() {
    const output = document.getElementById("output");
    output.select();
    document.execCommand("copy");
}
</script>

</body>
</html>
