<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>JSON ↔ XML Converter Online | Avonci Tools</title>
    <meta name="description" content="Convert JSON to XML and XML to JSON instantly. Free online converter tool with no upload required.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <!-- SEO -->
    <link rel="canonical" href="https://avonci.net/tools/json">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="../style.css">

    <style>
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            resize: vertical;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .buttons button {
            flex: 1;
        }

        .error {
            color: #ef4444;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/" class="back">← Back</a>

    <h1>JSON ↔ XML Converter</h1>

    <div class="tool-card">

        <textarea id="input" placeholder="Paste JSON or XML here..."></textarea>

        <div class="buttons">
            <button onclick="jsonToXml()">JSON → XML</button>
            <button onclick="xmlToJson()">XML → JSON</button>
        </div>

        <textarea id="output" placeholder="Result will appear here..."></textarea>

        <div id="error" class="error"></div>

    </div>

</div>

<script>
function jsonToXml() {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");
    const error = document.getElementById("error");

    error.textContent = "";

    try {
        const obj = JSON.parse(input);
        const xml = convertToXml(obj);
        output.value = xml;
    } catch (e) {
        error.textContent = "Invalid JSON input";
    }
}

function convertToXml(obj, indent = "") {
    let xml = "";

    for (let key in obj) {
        if (typeof obj[key] === "object") {
            xml += `${indent}<${key}>\n`;
            xml += convertToXml(obj[key], indent + "  ");
            xml += `${indent}</${key}>\n`;
        } else {
            xml += `${indent}<${key}>${obj[key]}</${key}>\n`;
        }
    }

    return xml;
}

function xmlToJson() {
    const input = document.getElementById("input").value;
    const output = document.getElementById("output");
    const error = document.getElementById("error");

    error.textContent = "";

    try {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(input, "text/xml");

        if (xmlDoc.getElementsByTagName("parsererror").length) {
            throw new Error();
        }

        const json = xmlToJsonRecursive(xmlDoc.documentElement);
        output.value = JSON.stringify(json, null, 2);
    } catch (e) {
        error.textContent = "Invalid XML input";
    }
}

function xmlToJsonRecursive(node) {
    let obj = {};

    if (node.children.length === 0) {
        return node.textContent;
    }

    for (let child of node.children) {
        obj[child.nodeName] = xmlToJsonRecursive(child);
    }

    return obj;
}
</script>

</body>
</html>
