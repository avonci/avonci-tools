<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter – Count Words & Characters | Avonci Tools</title>
    <meta name="description" content="Free online word counter. Check word count, character count, and estimated reading time instantly.">
    <link rel="canonical" href="https://avonci.net/tools/word-counter">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back">← Back</a>

    <h1>Word Counter</h1>
    <p>Analyze your text for length and reading time.</p>

    <div class="card tool-card" style="max-width: 600px;">
        <textarea id="textInput" placeholder="Paste or type your text here..." 
            style="width: 100%; height: 200px; padding: 15px; border-radius: var(--radius); 
            background: #0f172a; color: var(--text); border: 1px solid #334155; 
            resize: vertical; font-size: 1rem; outline: none; transition: var(--transition);">
        </textarea>

        <div id="result" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px;">
            <div>
                <div style="color: var(--primary); font-size: 1.5rem; font-weight: bold;" id="wordCount">0</div>
                <div style="font-size: 0.8rem; color: var(--muted);">Words</div>
            </div>
            <div>
                <div style="color: var(--primary); font-size: 1.5rem; font-weight: bold;" id="charCount">0</div>
                <div style="font-size: 0.8rem; color: var(--muted);">Characters</div>
            </div>
            <div>
                <div style="color: var(--primary); font-size: 1.5rem; font-weight: bold;" id="readingTime">0m</div>
                <div style="font-size: 0.8rem; color: var(--muted);">Read Time</div>
            </div>
        </div>

        <button onclick="clearText()" style="background: #ef4444; margin-top: 20px;">Clear Text</button>
    </div>
</div>

<script src="word-counter.js"></script>
</body>
</html>
