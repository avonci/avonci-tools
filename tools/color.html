<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <meta charset="UTF-8">
    <title>Color Picker – HEX & RGB Converter | Avonci Tools</title>
    <meta name="description" content="Pick colors easily and get HEX and RGB values instantly. Free online color picker tool.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <!-- SEO -->
    <link rel="canonical" href="https://avonci.net/tools/color">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="../style.css">

    <style>
        .color-preview {
            width: 100%;
            height: 120px;
            border-radius: 15px;
            margin: 15px 0;
            background: #3b82f6;
        }

        .values {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .values input {
            text-align: center;
            font-weight: bold;
        }

        .copy-btn {
            background: #22c55e;
            margin-top: 5px;
        }

        .copy-btn:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/" class="back">← Back</a>

    <h1>Color Picker</h1>

    <div class="tool-card">

        <input type="color" id="colorInput" value="#3b82f6">

        <div class="color-preview" id="preview"></div>

        <div class="values">
            <input type="text" id="hex" readonly>
            <button class="copy-btn" onclick="copyValue('hex')">Copy HEX</button>

            <input type="text" id="rgb" readonly>
            <button class="copy-btn" onclick="copyValue('rgb')">Copy RGB</button>
        </div>

        <div id="result"></div>

    </div>

</div>

<script>
const colorInput = document.getElementById("colorInput");
const preview = document.getElementById("preview");
const hexField = document.getElementById("hex");
const rgbField = document.getElementById("rgb");

function hexToRgb(hex) {
    const bigint = parseInt(hex.slice(1), 16);
    const r = (bigint >> 16) & 255;
    const g = (bigint >> 8) & 255;
    const b = bigint & 255;
    return `rgb(${r}, ${g}, ${b})`;
}

function updateColor() {
    const color = colorInput.value;

    preview.style.background = color;
    hexField.value = color.toUpperCase();
    rgbField.value = hexToRgb(color);
}

function copyValue(id) {
    const input = document.getElementById(id);
    input.select();
    document.execCommand("copy");
}

colorInput.addEventListener("input", updateColor);

// Initialize
updateColor();
</script>

</body>
</html>
