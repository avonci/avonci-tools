    <meta charset="UTF-8">

    <title>Case Converter – Change Text Case Online | Avonci Tools</title>
    <meta name="description" content="Free online tool to convert text to UPPERCASE, lowercase, Title Case, Sentence case, and more. Copy results instantly.">

    <meta property="og:title" content="Case Converter – Transform Text Instantly">

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <style>
        .case-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        .case-grid button {
            background: var(--card-hover);
            font-size: 0.9rem;
            padding: 12px 5px;
        }
        .case-grid button:hover {
            background: var(--primary);
        }
        textarea {
            width: 100%;
            height: 250px;
            background: #0f172a;
            color: var(--text);
            border: 1px solid #334155;
            padding: 15px;
            border-radius: var(--radius);
            font-size: 1rem;
            line-height: 1.5;
            resize: vertical;
        }
        .copy-btn {
            background: var(--primary);
            width: 100%;
            padding: 15px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back">← Back</a>

    <div class="card tool-card">
        <h1>Case Converter</h1>
        <p style="color: var(--muted); margin-bottom: 20px;">Transform your text between different letter cases instantly.</p>

        <textarea id="textInput" placeholder="Paste or type your text here..."></textarea>
        
        <div class="case-grid">
            <button onclick="convert('upper')">UPPERCASE</button>
            <button onclick="convert('lower')">lowercase</button>
            <button onclick="convert('title')">Title Case</button>
            <button onclick="convert('sentence')">Sentence Case</button>
            <button onclick="convert('snake')">snake_case</button>
            <button onclick="convert('kebab')">kebab-case</button>
        </div>

        <button onclick="copyText()" class="copy-btn">Copy to Clipboard</button>
        <p id="status" style="text-align: center; font-size: 0.8rem; color: #10b981; margin-top: 10px; min-height: 1em;"></p>
    </div>
</div>

<script>
function convert(type) {
    let textArea = document.getElementById('textInput');
    let str = textArea.value;
    if (!str) return;

    // Helper to turn snake_case or kebab-case back into regular text with spaces
    const cleanStr = (s) => s.replace(/[_-]/g, ' ');

    switch(type) {
        case 'upper': 
            str = cleanStr(str).toUpperCase(); 
            break;
            
        case 'lower': 
            str = cleanStr(str).toLowerCase(); 
            break;
            
        case 'title': 
            str = cleanStr(str).toLowerCase()
                .split(' ')
                .filter(word => word.length > 0)
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' '); 
            break;
            
        case 'sentence':
            str = cleanStr(str).toLowerCase()
                .replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
            break;
            
        case 'snake':
            // Convert spaces and hyphens to underscores
            str = str.trim().replace(/[\s-]+/g, '_').toLowerCase();
            break;
            
        case 'kebab':
            // Convert spaces and underscores to hyphens
            str = str.trim().replace(/[\s_]+/g, '-').toLowerCase();
            break;
    }
    textArea.value = str;
}

function copyText() {
    const textArea = document.getElementById('textInput');
    const status = document.getElementById('status');
    
    if (!textArea.value) return;
    
    navigator.clipboard.writeText(textArea.value).then(() => {
        status.innerText = "Copied to clipboard!";
        setTimeout(() => { status.innerText = ""; }, 2000);
    });
}
</script>

</body>
</html>
