<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer – Pomodoro Focus Timer | Avonci Tools</title>
    <meta name="description" content="Free online study timer with Pomodoro technique and visual progress ring. Stay focused with 25-minute sessions.">
    <link rel="canonical" href="https://avonci.net/tools/timer">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <link rel="stylesheet" href="../style.css">
    
    <style>
        .timer-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
        }

        /* The circular progress bar */
        svg {
            transform: rotate(-90deg);
            width: 250px;
            height: 250px;
        }

        circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .bg-circle {
            stroke: #334155;
        }

        .progress-circle {
            stroke: var(--primary);
            transition: stroke-dashoffset 1s linear;
        }

        #time {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: bold;
            font-family: monospace;
            margin: 0;
        }

        .presets button {
            padding: 8px 15px;
            font-size: 0.85rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .presets button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back">← Back</a>

    <div class="card tool-card" style="max-width: 500px;">
        <h1>Study Timer</h1>
        <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 20px;">Stay productive with timed sessions.</p>

        <div class="presets" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <button onclick="setPreset(25)" style="background: var(--primary);">Focus (25m)</button>
            <button onclick="setPreset(5)" style="background: #10b981;">Short Break</button>
            <button onclick="setPreset(15)" style="background: #6366f1;">Long Break</button>
        </div>

        <div class="timer-container">
            <svg>
                <circle class="bg-circle" cx="125" cy="125" r="110"></circle>
                <circle id="progress" class="progress-circle" cx="125" cy="125" r="110"></circle>
            </svg>
            <div id="time">25:00</div>
        </div>

        <div class="buttons" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
            <button id="startBtn" onclick="startTimer()" style="flex: 2; background: var(--primary);">Start</button>
            <button onclick="pauseTimer()" style="flex: 1; background: var(--card-hover);">Pause</button>
            <button onclick="resetTimer()" style="flex: 1; background: #ef4444;">Reset</button>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
            <label style="color: var(--muted); font-size: 0.8rem;">Custom Minutes</label><br>
            <input type="number" id="customMins" value="25" min="1" 
                   style="width: 100px; text-align: center; margin-top: 5px;">
        </div>
    </div>
</div>

<audio id="alarm">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
    let timer;
    let isRunning = false;
    let totalSeconds = 25 * 60;
    let remainingSeconds = 25 * 60;

    const timeDisplay = document.getElementById("time");
    const progressCircle = document.getElementById("progress");
    const alarm = document.getElementById("alarm");
    const startBtn = document.getElementById("startBtn");

    // Circle Math
    const radius = 110;
    const circumference = 2 * Math.PI * radius;
    progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;
    progressCircle.style.strokeDashoffset = 0;

    function setProgress(percent) {
        const offset = circumference - (percent / 100 * circumference);
        progressCircle.style.strokeDashoffset = offset;
    }

    function updateDisplay() {
        let min = Math.floor(remainingSeconds / 60);
        let sec = remainingSeconds % 60;
        const formattedTime = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        
        timeDisplay.textContent = formattedTime;
        document.title = isRunning ? `(${formattedTime}) Focus` : "Study Timer - Avonci Tools";

        // Update Circle
        const percentage = (remainingSeconds / totalSeconds) * 100;
        setProgress(percentage);
    }

    function setPreset(mins) {
        document.getElementById("customMins").value = mins;
        resetTimer();
    }

    function startTimer() {
        if (isRunning) return;
        isRunning = true;
        startBtn.style.opacity = "0.5";
        startBtn.innerText = "Running...";

        timer = setInterval(() => {
            if (remainingSeconds > 0) {
                remainingSeconds--;
                updateDisplay();
            } else {
                clearInterval(timer);
                isRunning = false;
                startBtn.style.opacity = "1";
                startBtn.innerText = "Start";
                alarm.play();
                alert("Time is up! Great job.");
            }
        }, 1000);
    }

    function pauseTimer() {
        clearInterval(timer);
        isRunning = false;
        startBtn.style.opacity = "1";
        startBtn.innerText = "Start";
    }

    function resetTimer() {
        pauseTimer();
        const mins = parseInt(document.getElementById("customMins").value) || 25;
        totalSeconds = mins * 60;
        remainingSeconds = totalSeconds;
        updateDisplay();
    }

    // Initialize
    updateDisplay();
</script>

</body>
</html>
