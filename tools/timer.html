<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Study Timer – Pomodoro Focus Timer | Avonci Tools</title>
    <meta name="description" content="Free online study timer with Pomodoro technique. Stay focused with 25-minute study sessions and breaks.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://avonci.net/tools/timer.html">

    <meta name="keywords" content="study timer, pomodoro timer, focus timer, productivity timer">

    <meta property="og:title" content="Study Timer – Focus Tool">
    <meta property="og:description" content="Simple Pomodoro study timer to improve focus and productivity.">
    <meta property="og:url" content="https://avonci.net/tools/timer.html">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="../style.css">

    <style>
        .timer-box {
            max-width: 400px;
            margin: auto;
            text-align: center;
        }

        #time {
            font-size: 4rem;
            margin: 30px 0;
        }

        .buttons button {
            margin: 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            font-weight: bold;
        }

        .buttons button:hover {
            background: #2563eb;
        }

        input {
            width: 100px;
            padding: 8px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="../index.html" class="back">← Back</a>

    <div class="timer-box">
        <h1>Study Timer</h1>

        <div>
            <label>Minutes:</label>
            <input type="number" id="minutes" value="25" min="1">
        </div>

        <div id="time">25:00</div>

        <div class="buttons">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
    </div>

</div>

<script>
let timer;
let totalSeconds;
let remainingSeconds;
let isRunning = false;

function setupTimer() {
    let minutes = parseInt(document.getElementById("minutes").value);
    totalSeconds = minutes * 60;
    remainingSeconds = totalSeconds;
    updateDisplay();
}

function updateDisplay() {
    let min = Math.floor(remainingSeconds / 60);
    let sec = remainingSeconds % 60;
    document.getElementById("time").textContent =
        `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
}

function startTimer() {
    if (isRunning) return;

    if (!remainingSeconds) {
        setupTimer();
    }

    isRunning = true;

    timer = setInterval(() => {
        if (remainingSeconds > 0) {
            remainingSeconds--;
            updateDisplay();
        } else {
            clearInterval(timer);
            isRunning = false;
            alert("Time is up!");
        }
    }, 1000);
}

function pauseTimer() {
    clearInterval(timer);
    isRunning = false;
}

function resetTimer() {
    clearInterval(timer);
    isRunning = false;
    setupTimer();
}

// initialize
setupTimer();
</script>

</body>
</html>
