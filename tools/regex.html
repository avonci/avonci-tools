<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester | Avonci Tools</title>
    <meta name="description" content="Professional live regex tester and debugger. Test regular expressions with real-time highlighting and flag support.">
    <meta name="keywords" content="regex tester, regular expression, javascript regex, online regex debugger, avonci tools">
    <link rel="canonical" href="https://avonci.net/regex">

    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <link rel="stylesheet" href="../style.css">

    <style>
        .regex-editor {
            position: relative;
            width: 100%;
            height: 250px;
            margin: 15px 0;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .regex-editor:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }
    
        #textInput, #highlightLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 16px;
            margin: 0;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            border: none;
            outline: none;
            background: transparent;
            box-sizing: border-box;
        }
        
        #textInput {
            color: transparent;
            caret-color: var(--text); 
            z-index: 2;
            resize: none;
        }
        
        #highlightLayer {
            color: var(--text);
            z-index: 1;
            pointer-events: none; 
            overflow-y: auto; 
        }
        
        .highlight {
            background: rgba(56, 189, 248, 0.25);
            border-bottom: 2px solid var(--primary);
            border-radius: 2px;
            margin: 0 -1px;
        }
    </style>
</head>

<body>

<div class="container">
    <a href="../index.html" class="back">← Back</a>

    <div class="tool-card">
        <h1>Regex Tester</h1>
        <p>Live expression debugging with visual highlighting.</p>

        <input type="text" id="pattern" placeholder="Enter pattern (e.g. [a-z0-9]+)" autocomplete="off">

        <div class="flag-container">
            <label class="flag-label"><input type="checkbox" id="flagG" checked> Global (g)</label>
            <label class="flag-label"><input type="checkbox" id="flagI"> Ignore Case (i)</label>
            <label class="flag-label"><input type="checkbox" id="flagM"> Multiline (m)</label>
        </div>

        <div class="regex-editor">
            <div id="highlightLayer"></div>
            <textarea id="textInput" placeholder="Enter text to test..." onscroll="syncScroll()" oninput="update()"></textarea>
        </div>

        <div id="matchCount" class="match-counter">Matches: 0</div>

        <div class="cheat-sheet">
            <div class="cheat-item"><code>\d</code> Digit</div>
            <div class="cheat-item"><code>\w</code> Word char</div>
            <div class="cheat-item"><code>[a-z]</code> Range</div>
            <div class="cheat-item"><code>+</code> 1 or more</div>
            <div class="cheat-item"><code>*</code> 0 or more</div>
            <div class="cheat-item"><code>^</code> Start</div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>© 2026 Avonci Tools. All rights reserved.</p>
        </div>
    </footer>
</div>

<script>
    const patternInput = document.getElementById("pattern");
    const textInput = document.getElementById("textInput");
    const highlightLayer = document.getElementById("highlightLayer");
    const matchCountDisplay = document.getElementById("matchCount");

    function syncScroll() {
        highlightLayer.scrollTop = textInput.scrollTop;
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        })[m]);
    }

    function update() {
        const pattern = patternInput.value;
        const text = textInput.value;
        
        if (!pattern || !text) {
            highlightLayer.innerHTML = escapeHTML(text);
            matchCountDisplay.innerText = "Matches: 0";
            return;
        }

        try {
            let flags = "";
            if (document.getElementById("flagG").checked) flags += "g";
            if (document.getElementById("flagI").checked) flags += "i";
            if (document.getElementById("flagM").checked) flags += "m";

            const regex = new RegExp(pattern, flags);
            let matchCount = 0;

            const highlighted = text.replace(regex, (match) => {
                matchCount++;
                return `###MATCH###${match}###END###`;
            });

            const finalHTML = escapeHTML(highlighted)
                .replace(/###MATCH###/g, '<span class="highlight">')
                .replace(/###END###/g, '</span>');

            highlightLayer.innerHTML = finalHTML + "\n";
            matchCountDisplay.innerText = `Matches: ${matchCount}`;
            matchCountDisplay.style.color = "var(--primary)";
        } catch (e) {
            highlightLayer.innerHTML = escapeHTML(text);
            matchCountDisplay.innerText = "Invalid Regex Pattern";
            matchCountDisplay.style.color = "#ff4444";
        }
    }

    patternInput.addEventListener("input", update);
    document.querySelectorAll('.flag-label input').forEach(cb => cb.addEventListener('change', update));
</script>

</body>
</html>
