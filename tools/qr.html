<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <meta charset="UTF-8">
    <title>QR Code Generator – Create QR Codes Online | Avonci Tools</title>
    <meta name="description" content="Generate QR codes instantly from text, links, or anything. Free online QR code generator with download option.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <!-- SEO -->
    <link rel="canonical" href="https://avonci.net/tools/qr">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">

    <!-- Styles -->
    <link rel="stylesheet" href="../style.css">

    <style>
        .qr-box {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            background: #1e293b;
        }

        #qrCanvas {
            margin-top: 15px;
        }

        .download-btn {
            margin-top: 15px;
            background: #22c55e;
        }

        .download-btn:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/" class="back">← Back</a>

    <h1>QR Code Generator</h1>

    <div class="tool-card">

        <input type="text" id="text" placeholder="Enter text or URL...">

        <button onclick="generateQR()">Generate QR Code</button>

        <div class="qr-box">
            <canvas id="qrCanvas"></canvas>
        </div>

        <button class="download-btn" onclick="downloadQR()">Download QR</button>

    </div>

</div>

<!-- QR Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>
const canvas = document.getElementById("qrCanvas");

function generateQR() {
    const text = document.getElementById("text").value.trim();

    if (!text) {
        alert("Enter something first!");
        return;
    }

    QRCode.toCanvas(canvas, text, {
        width: 200
    });
}

// Generate default QR on load
window.onload = () => {
    QRCode.toCanvas(canvas, "https://avonci.net", { width: 200 });
};

// Download QR
function downloadQR() {
    const link = document.createElement("a");
    link.download = "qr-code.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
