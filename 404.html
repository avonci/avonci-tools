<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Avonci Tools</title>
    <link rel="stylesheet" href="/style.css"> <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">

    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0;
            background: linear-gradient(to bottom, var(--primary), #020617);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
        }

        .error-message {
            margin-top: -20px;
            z-index: 1;
        }

        .glitch-text {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 30px;
        }

        .home-btn {
            background: var(--primary);
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .home-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Subtle floating animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .floating-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-container">
        <div class="floating-icon">🛸</div>
        <h1 class="error-code">404</h1>
        
        <div class="error-message">
            <p class="glitch-text">Oops! You've drifted into deep space.</p>
            <p style="color: var(--muted); margin-bottom: 40px; max-width: 400px;">
                The tool or game you are looking for has moved, been renamed, or never existed in this dimension.
            </p>
            <a href="/" class="home-btn">Return to Mission Control</a>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2026 Avonci Tools • Lost but found</p>
</footer>

</body>
</html>
