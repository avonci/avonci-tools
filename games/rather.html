<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Would You Rather – Party Game | Avonci Games</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <style>
        .rather-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        .option-card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }

        .option-card:hover {
            border-color: var(--primary);
            background: var(--card-hover);
        }

        .option-text {
            font-size: 1.4rem;
            font-weight: 700;
            z-index: 2;
        }

        .percentage {
            display: none;
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 10px;
            z-index: 2;
        }

        .or-divider {
            font-weight: 800;
            color: var(--muted);
            letter-spacing: 4px;
        }

        .voted .percentage { display: block; }
        .voted .option-text { font-size: 1rem; opacity: 0.8; }
        
        /* The progress bar background effect */
        .progress-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 0%;
            width: 100%;
            background: var(--primary-glow);
            transition: height 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back">← Back</a>

    <div class="tool-card" style="text-align: center;">
        <h1 style="font-size: 1.5rem; margin-bottom: 5px;">Would You Rather?</h1>
        <p id="counter" style="color: var(--muted); font-size: 0.8rem;">Question 1</p>

        <div class="rather-container" id="gameBoard">
            <div class="option-card" onclick="handleVote('a')">
                <div id="perc-a" class="percentage">50%</div>
                <div id="text-a" class="option-text">Option A</div>
                <div id="bar-a" class="progress-bg"></div>
            </div>

            <div class="or-divider">OR</div>

            <div class="option-card" onclick="handleVote('b')">
                <div id="perc-b" class="percentage">50%</div>
                <div id="text-b" class="option-text">Option B</div>
                <div id="bar-b" class="progress-bg"></div>
            </div>
        </div>

        <button id="nextBtn" class="copy-btn" style="margin-top: 30px; display: none;" onclick="nextQuestion()">Next Question →</button>
    </div>
</div>

<script>
    const questions = [
        { a: "Always have to shout when you speak", b: "Always have to whisper when you speak" },
        { a: "Be able to fly at walking speed", b: "Be able to run at 100mph but only in reverse" },
        { a: "Have a permanent clown face", b: "Have permanent clown shoes you can never take off" },
        { a: "Live without music for a year", b: "Live without movies for a year" },
        { a: "Eat a whole raw onion", b: "Eat a whole lemon (peel included)" },
        { a: "Know the date of your death", b: "Know the cause of your death" }
    ];

    let currentIdx = 0;
    let canVote = true;

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('text-a').innerText = q.a;
        document.getElementById('text-b').innerText = q.b;
        document.getElementById('counter').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        
        // Reset styles
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('voted'));
        document.getElementById('bar-a').style.height = "0%";
        document.getElementById('bar-b').style.height = "0%";
        document.getElementById('nextBtn').style.display = "none";
        canVote = true;
    }

    function handleVote(choice) {
        if (!canVote) return;
        canVote = false;

        // Generate "Random but believable" percentages
        const valA = Math.floor(Math.random() * 40) + 30; // 30% to 70%
        const valB = 100 - valA;

        // Reveal
        document.getElementById('perc-a').innerText = valA + "%";
        document.getElementById('perc-b').innerText = valB + "%";
        
        document.getElementById('bar-a').style.height = valA + "%";
        document.getElementById('bar-b').style.height = valB + "%";

        document.querySelectorAll('.option-card').forEach(c => c.classList.add('voted'));
        document.getElementById('nextBtn').style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx >= questions.length) {
            currentIdx = 0; // Loop back or show "Game Over"
        }
        loadQuestion();
    }

    // Init
    loadQuestion();
</script>
</body>
</html>
