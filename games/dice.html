<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roll & Flip | Avonci Tools</title>
    <meta name="description" content="A high-performance 3D dice roller and coin flipper. Physics-based randomization engine for developers and gamers.">
    <meta name="keywords" content="dice roller, coin flip, 3d dice, online dice, avonci tools, randomization, heads or tails">
    <link rel="canonical" href="https://avonci.net/dice">
    <link rel="stylesheet" href="../style.css">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-KGWK2G7HZ2');
    </script>

    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <style>
        /* 3D Dice Specifics - Using your --primary and --border */
        .dice-scene {
            width: 100px;
            height: 100px;
            perspective: 600px;
            margin: 40px auto;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .dice-face {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid var(--primary);
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 15px;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: inset 0 0 15px var(--primary-glow);
            backface-visibility: hidden;
        }

        .dot { 
            width: 12px; 
            height: 12px; 
            background: var(--text); 
            border-radius: 50%; 
            align-self: center; 
            justify-self: center; 
            box-shadow: 0 0 8px var(--primary-glow); 
        }

        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-2 { transform: rotateY(90deg) translateZ(50px); }
        .face-3 { transform: rotateY(180deg) translateZ(50px); }
        .face-4 { transform: rotateY(-90deg) translateZ(50px); }
        .face-5 { transform: rotateX(90deg) translateZ(50px); }
        .face-6 { transform: rotateX(-90deg) translateZ(50px); }

        /* Coin Specifics */
        .coin-scene {
            width: 120px;
            height: 120px;
            perspective: 1000px;
            margin: 40px auto;
            display: none;
        }

        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* FIX 1: This prevents the 'see-through' effect */
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            border: 2px solid var(--primary);
            
            /* FIX 2: Use a solid color instead of rgba to ensure it's opaque */
            background: #0b1121; 
            color: var(--text);
            box-shadow: 0 0 20px var(--primary-glow);
        }
        
        .coin-back { 
            transform: rotateY(180deg); 
            color: var(--primary); 
            /* Ensures the back side also has a solid background */
            background: #0b1121; 
        }

        /* Custom tab styling using your variables */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
        }

        .tab-btn {
            flex: 1;
            background: var(--card-bg);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .tab-btn.active {
            background: var(--primary);
            color: #000;
        }

        #statusText {
            margin-top: 15px;
            font-weight: 600;
            color: var(--primary);
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back">← Back</a>
    
    <div class="tool-card">
        <h1>Roll & Flip</h1>
        <p>A high-performance randomization engine for the Avonci suite.</p>

        <div class="tab-container">
            <button id="diceTab" class="tab-btn active" onclick="switchTab('dice')">3D Dice</button>
            <button id="coinTab" class="tab-btn" onclick="switchTab('coin')">3D Coin</button>
        </div>

        <div id="diceArea">
            <div class="dice-scene">
                <div class="dice" id="dice">
                    <div class="dice-face face-1"><span class="dot" style="grid-area: 2/2;"></span></div>
                    <div class="dice-face face-2"><span class="dot" style="grid-area: 1/1;"></span><span class="dot" style="grid-area: 3/3;"></span></div>
                    <div class="dice-face face-3"><span class="dot" style="grid-area: 1/1;"></span><span class="dot" style="grid-area: 2/2;"></span><span class="dot" style="grid-area: 3/3;"></span></div>
                    <div class="dice-face face-4"><span class="dot" style="grid-area: 1/1;"></span><span class="dot" style="grid-area: 1/3;"></span><span class="dot" style="grid-area: 3/1;"></span><span class="dot" style="grid-area: 3/3;"></span></div>
                    <div class="dice-face face-5"><span class="dot" style="grid-area: 1/1;"></span><span class="dot" style="grid-area: 1/3;"></span><span class="dot" style="grid-area: 2/2;"></span><span class="dot" style="grid-area: 3/1;"></span><span class="dot" style="grid-area: 3/3;"></span></div>
                    <div class="dice-face face-6"><span class="dot" style="grid-area: 1/1;"></span><span class="dot" style="grid-area: 1/3;"></span><span class="dot" style="grid-area: 2/1;"></span><span class="dot" style="grid-area: 2/3;"></span><span class="dot" style="grid-area: 3/1;"></span><span class="dot" style="grid-area: 3/3;"></span></div>
                </div>
            </div>
            <button onclick="rollDice()">Roll Dice</button>
        </div>

        <div id="coinArea" style="display: none;">
            <div class="coin-scene" id="coinScene">
                <div class="coin" id="coin">
                    <div class="coin-face">HEADS</div>
                    <div class="coin-face coin-back">TAILS</div>
                </div>
            </div>
            <button onclick="flipCoin()">Flip Coin</button>
        </div>
    </div>
</div>

<script>
    let xRotation = 0;
    let yRotation = 0;
    let coinRotation = 0;

    function switchTab(mode) {
        document.getElementById('diceArea').style.display = mode === 'dice' ? 'block' : 'none';
        document.getElementById('coinArea').style.display = mode === 'coin' ? 'block' : 'none';
        document.getElementById('coinScene').style.display = mode === 'coin' ? 'block' : 'none';
        document.getElementById('diceTab').classList.toggle('active', mode === 'dice');
        document.getElementById('coinTab').classList.toggle('active', mode === 'coin');
    }

    function rollDice() {
        const result = Math.floor(Math.random() * 6) + 1;
        
        // Cumulative rotation fix: adds massive spin to the existing total
        xRotation += Math.floor(Math.random() * 4 + 5) * 90; 
        yRotation += Math.floor(Math.random() * 4 + 5) * 90;

        const targets = {
            1: { x: 0, y: 0 },
            2: { x: 0, y: -90 },
            3: { x: 0, y: -180 },
            4: { x: 0, y: 90 },
            5: { x: -90, y: 0 },
            6: { x: 90, y: 0 }
        };

        const target = targets[result];
        const dice = document.getElementById('dice');
        
        dice.style.transform = `rotateX(${xRotation + target.x}deg) rotateY(${yRotation + target.y}deg)`;
    }

    function flipCoin() {
        const isHeads = Math.random() < 0.5;
        // Cumulative rotation fix: adds at least 5 full flips to existing rotation
        coinRotation += isHeads ? 1800 : 1980; 
        
        const coin = document.getElementById('coin');
        coin.style.transform = `rotateY(${coinRotation}deg)`;
    }
</script>

</body>
</html>
