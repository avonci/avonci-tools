<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KGWK2G7HZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KGWK2G7HZ2');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trap – Social Mystery Game | Avonci Games</title>
    <meat name="description" content="Can you spot the glitch in the group? A social deduction game of wit and wordplay. Everyone gets the prompt; the Imposter gets a different one. Through a series of subtle answers, the group must identify the outsider while the Imposter tries to steal the truth. Trust no one—even the most "obvious" answer might be a trap.">
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="/favicon.ico">

    <meta name="keywords" content="Game, Social game, Imposter, Trap, Fun">
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">


    <style>
        .step { display: none; }
        .active { display: block; }
        
        .answer-list { list-style: none; padding: 0; margin-top: 20px; }
        .answer-item { 
            background: var(--card-bg); 
            margin: 10px 0; 
            padding: 20px; 
            border-radius: 12px; 
            font-size: 1.2rem;
            border-left: 4px solid var(--primary);
            text-align: left;
        }

        #secretContent {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .reveal-overlay {
            padding: 40px 20px;
            border: 2px dashed var(--border);
            border-radius: 15px;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="../index.html" class="back">← Back</a>

    <div class="card tool-card" style="text-align: center;">
        <h1>🕵️ The Trap</h1>

        <div id="step1" class="step active">
            <p>Gather your friends. How many are playing?</p>
            <input type="number" id="playerCount" value="3" min="3" max="12">
            <button class="copy-btn" onclick="setupGame()">Start Game</button>
        </div>

        <div id="step2" class="step">
            <h2 id="playerTurn">Player 1</h2>
            
            <div id="gatekeeper" class="reveal-overlay">
                <p>Pass the phone to <span id="targetPlayer" style="color: var(--primary); font-weight: bold;">Player 1</span></p>
                <button class="copy-btn" onclick="revealForPlayer()">I am Player <span id="btnNum">1</span></button>
            </div>

            <div id="secretContent" style="display:none;">
                <p>Your Secret Question:</p>
                <p id="questionDisplay" style="font-size: 1.3rem; font-weight: bold; color: var(--primary); margin: 15px 0;"></p>
                <input type="text" id="answerInput" placeholder="Enter a short answer..." autocomplete="off">
                <button class="copy-btn" onclick="submitAnswer()">Submit & Hide</button>
            </div>
        </div>

        <div id="step3" class="step">
            <h2>The Results</h2>
            <p style="margin-bottom: 20px;">One of these answers was for a <strong>different question</strong>. Find the imposter!</p>
            <ul id="resultsList" class="answer-list"></ul>
            <button class="copy-btn" onclick="location.reload()" style="background:#ef4444; margin-top: 30px;">Play Again</button>
        </div>
    </div>
</div>

<script>
    const scenarios = [
        { q: "How many weeks without changing bed sheets?", trap: "How many weeks is a perfect vacation?" },
        { q: "How many hours of sleep do you need?", trap: "How many hours you study for an exam?" },
        { q: "How many showers do you take a week?", trap: "How many times a week do you eat out?" },
        { q: "What's the max price you'd pay for a burger?", trap: "What's the max price you'd pay for a movie ticket?" },
        { q: "How many pairs of shoes do you own?", trap: "How many slices of pizza can you eat?" },
        { q: "How many minutes is a good workout?", trap: "How many minutes do you spend on TikTok daily?" },
        { q:"How many alarms do you set in the morning?", trap:"How many coffees can you drink in a day?" },
        { q:"What age is ideal to retire?", trap:"What age is ideal to have kids?" },
        { q:"How many beers can you drink in a night?", trap:"How many good friends do you have?" },
        { q:"In which country would you never live?", trap:"Which country would you like to visit most?" },
        { q:"Which job would you like to try for a day?", trap:"Which job you would never want to have." },
        { q:"Which animal would be the worst pet?", trap:"Which animal would be the best pet?" },
        { q:"Which superpower would you like to have the most?", trap:"What is the most useless superpower?" },
        { q:"What color would you never paint your room?", trap:"What color would you paint a sports car?" },
        { q:"What is the best smell?", trap:"What is the worse smell?" },
        { q:"What tastes best cold?", trap:"What tastes best hot?" },
        { q:"What drink is overrated?", trap:"What drink is underrated?" },
        { q:"What car brand is the best?", trap:"What car brand is bad?" },
        { q:"How many years should a phone last?", trap:"How many years should a car last?" },
        { q:"What city would you never live in?", trap:"What city would you love to visit?" },
        { q:"Which app wastes the most time?", trap:"Which app is the most useful?" },
        { q:"Which movie is overrated?", trap:"Which movie is underrated?" },
        { q:"Which day of the week is best?", trap:"Which day of the week is worst?" },

    ];

    let players = [];
    let currentP = 0;
    let totalP = 0;
    let imposterIdx = 0;
    let currentScenario;

    function setupGame() {
        totalP = parseInt(document.getElementById('playerCount').value);
        imposterIdx = Math.floor(Math.random() * totalP);
        currentScenario = scenarios[Math.floor(Math.random() * scenarios.length)];
        showStep(2);
        prepareTurn();
    }

    function prepareTurn() {
        // Reset the UI for the next person
        document.getElementById('playerTurn').innerText = `Player ${currentP + 1}`;
        document.getElementById('targetPlayer').innerText = `Player ${currentP + 1}`;
        document.getElementById('btnNum').innerText = currentP + 1;
        
        document.getElementById('gatekeeper').style.display = "block";
        document.getElementById('secretContent').style.display = "none";
        document.getElementById('answerInput').value = "";
    }

    function revealForPlayer() {
        // Show the secret question
        document.getElementById('questionDisplay').innerText = (currentP == imposterIdx) ? currentScenario.trap : currentScenario.q;
        
        document.getElementById('gatekeeper').style.display = "none";
        document.getElementById('secretContent').style.display = "block";
        document.getElementById('answerInput').focus();
    }

    function submitAnswer() {
        const val = document.getElementById('answerInput').value.trim();
        if(!val) return alert("Please enter an answer!");
        
        players.push(val);
        currentP++;

        if(currentP < totalP) {
            prepareTurn();
        } else {
            showResults();
        }
    }

    function showResults() {
        const list = document.getElementById('resultsList');
        // Shuffle the results so the order doesn't give away the imposter
        const shuffled = players
            .map((val) => ({ val, sort: Math.random() }))
            .sort((a, b) => a.sort - b.sort);
        
        list.innerHTML = shuffled.map(item => `<li class="answer-item">"${item.val}"</li>`).join('');
        showStep(3);
    }

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step'+n).classList.add('active');
    }
</script>

</body>
</html>
